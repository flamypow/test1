<!DOCTYPE html>
<html>
<body>

<form>
	<input type = "text" id="queryone"/>
	<button id="submit">Search</button>
</form>
<br>
<button type = "button" id = "buttonten"> 10 </button>
<button type = "button" id = "buttontwenty"> 20 </button>
<button type = "button" id = "buttonthirty"> 30 </button>

<div class = "out" id = "out"></div>
<script>
	document.addEventListener("DOMContentLoaded", init);
	var onetotwo;
	var twotothree;
	function init(){
		document.getElementById("submit").addEventListener("click", ev => {
			ev.preventDefault();
			let url = 'https://api.giphy.com/v1/gifs/search?api_key=3WHSqYyUrdicuNNeOZ9LHFfZnwJCcrK7&limit=30&q=';
			let str = document.getElementById('queryone').value.trim();
			url = url.concat(str);
			fetch(url)
				.then(response => response.json())
				.then(content => {
				
				let out = document.querySelector('.out');
				document.getElementById('out').innerHTML = '';
				
				console.log(content.data);
				console.log("META", content.meta);
				for (let i = 0; i < 30; i++) {
				let img = document.createElement("img");
				img.id = i;
				img.src = content.data[i].images.downsized.url;
				img.alt = content.data[i].title;
				out.insertAdjacentElement("beforeend", img);
				} 
				
				document.querySelector('queryone').value = "";
				
				for (let i=11; i < 30; i++)
				{	
					document.getElementById(""+i).style.display === "none";
				}
				
				})
				.catch(err=>
				{
					console.error(err);
				});
		});
	
	}
</script>
</body>
</html>
